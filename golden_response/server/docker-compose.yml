version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: officebite-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: officebite-api
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/office-food-delivery
      - CLIENT_URL=http://localhost:5173
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: officebite-web
    ports:
      - '5173:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
